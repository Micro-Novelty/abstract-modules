name: Test Wheels

on:
  push:
    paths:
      - ".github/workflows/test_wheels.yml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────
  # Step 1: Fetch latest release wheel URLs
  # ─────────────────────────────────────────────────
  get-release:
    name: Fetch Latest Release Metadata
    runs-on: ubuntu-latest
    outputs:
      wheel_urls: ${{ steps.fetch.outputs.wheel_urls }}
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - name: Fetch latest release wheel URLs
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases/latest)
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          URLS=$(echo "$RELEASE_JSON" \
            | jq -c '[.assets[] | select(.name | endswith(".whl")) | .browser_download_url] | .[0:10]')
          echo "wheel_urls=$URLS" >> "$GITHUB_OUTPUT"
          echo "Found wheels for $TAG:"
          echo "$URLS" | jq -r '.[]'

  # ─────────────────────────────────────────────────
  # Step 2a: Linux + musl wheels (Docker on ubuntu)
  # ─────────────────────────────────────────────────
  test-linux:
    name: "Test Linux wheels"
    needs: get-release
    if: ${{ needs.get-release.outputs.wheel_urls != '[]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (for aarch64 containers)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Test all Linux wheels
        shell: bash
        env:
          WHEEL_URLS: ${{ needs.get-release.outputs.wheel_urls }}
        run: |
          set -euo pipefail
          FAILED=0
          TESTED=0

          # Dependencies to install before running the test script
          TEST_DEPS="scikit-learn aiohttp psutil pandas"

          for URL in $(echo "$WHEEL_URLS" | jq -r '.[]'); do
            FILENAME="${URL##*/}"

            # Skip non-Linux wheels
            if [[ "$FILENAME" != *"linux"* ]]; then
              echo "⏭ Skipping non-Linux wheel: $FILENAME"
              continue
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Testing: $FILENAME"

            # Decode Python version: cp310→3.10, cp311→3.11, cp312→3.12
            PY_TAG=$(echo "$FILENAME" | grep -oE 'cp3[0-9]+' | head -1)
            PY_MINOR="${PY_TAG#cp}"                        # 310, 311, 312
            PY_VERSION="${PY_MINOR:0:1}.${PY_MINOR:1}"    # 3.10, 3.11, 3.12
            echo "Python version: $PY_VERSION"

            # Choose Docker image based on musl vs manylinux and arch
            if [[ "$FILENAME" == *"musllinux"* ]]; then
              IMAGE="python:${PY_VERSION}-alpine"
              if [[ "$FILENAME" == *"aarch64"* ]]; then
                PLATFORM="linux/arm64"
              else
                PLATFORM="linux/amd64"
              fi
              PYBIN="python"
              INSTALL_EXTRA="apk add --no-cache curl gcc musl-dev libffi-dev && "
            else
              # manylinux — use the official manylinux image
              # Parse glibc version from wheel tag e.g. manylinux_2_28
              GLIBC=$(echo "$FILENAME" | grep -oE 'manylinux_[0-9]+_[0-9]+' | head -1)
              if [[ -z "$GLIBC" ]]; then
                GLIBC="manylinux_2_28"  # fallback
              fi
              if [[ "$FILENAME" == *"aarch64"* ]]; then
                IMAGE="quay.io/pypa/${GLIBC}_aarch64"
                PLATFORM="linux/arm64"
              else
                IMAGE="quay.io/pypa/${GLIBC}_x86_64"
                PLATFORM="linux/amd64"
              fi
              # manylinux images use /opt/python/cpXYZ-cpXYZ/bin/python3
              PYBIN="/opt/python/cp${PY_MINOR}-cp${PY_MINOR}/bin/python3"
              INSTALL_EXTRA=""
            fi

            echo "Image:    $IMAGE"
            echo "Platform: $PLATFORM"
            echo "PyBin:    $PYBIN"

            # Download wheel into workspace
            curl -fsSL -o "$FILENAME" "$URL"
            echo "has Downloaded $(du -sh "$FILENAME" | cut -f1): $FILENAME"

            # Run install + test inside container
            if docker run --rm --platform "$PLATFORM" \
              -v "$PWD:/workspace" -w /workspace \
              "$IMAGE" \
              sh -c "${INSTALL_EXTRA}${PYBIN} -m pip install --upgrade pip --quiet && ${PYBIN} -m pip install ./${FILENAME} && ${PYBIN} -m pip install ${TEST_DEPS} --quiet && ${PYBIN} abstract_test.py"; then
              echo "✅ HAS PASSED: $FILENAME"
              TESTED=$((TESTED + 1))
            else
              echo "❌ FAILED: $FILENAME"
              FAILED=$((FAILED + 1))
            fi

            # Clean up wheel between runs
            rm -f "$FILENAME"
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Linux wheels tested: $TESTED | Failed: $FAILED"

          if [[ $TESTED -eq 0 ]]; then
            echo "❌ No Linux wheels were found or tested!"
            exit 1
          fi
          if [[ $FAILED -gt 0 ]]; then
            exit 1
          fi

  # ─────────────────────────────────────────────────
  # Step 2b: macOS wheels — native runners required
  # ─────────────────────────────────────────────────
  test-macos:
    name: "Test macOS ${{ matrix.arch }} wheels"
    needs: get-release
    if: ${{ needs.get-release.outputs.wheel_urls != '[]' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13        # x86_64
            arch: x86_64
          - os: macos-latest    # arm64
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required Python versions via Homebrew
        shell: bash
        run: |
          # Ensure python 3.10, 3.11, 3.12 are available
          for V in 3.10 3.11 3.12; do
            if ! command -v "python$V" &>/dev/null; then
              echo "Installing python@$V..."
              brew install "python@$V" || true
            else
              echo "python$V already available: $(python$V --version)"
            fi
          done

      - name: Test macOS ${{ matrix.arch }} wheels
        shell: bash
        env:
          WHEEL_URLS: ${{ needs.get-release.outputs.wheel_urls }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          FAILED=0
          TESTED=0

          # Dependencies to install before running the test script
          TEST_DEPS="scikit-learn aiohttp psutil pandas"

          for URL in $(echo "$WHEEL_URLS" | jq -r '.[]'); do
            FILENAME="${URL##*/}"

            # Only macOS wheels for this arch
            if [[ "$FILENAME" != *"macosx"* ]]; then
              echo "⏭ Skipping non-macOS wheel: $FILENAME"
              continue
            fi
            if [[ "$FILENAME" != *"$ARCH"* ]]; then
              echo "⏭ Skipping wrong-arch wheel ($ARCH): $FILENAME"
              continue
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Testing: $FILENAME"

            # Decode Python version from cp tag
            PY_TAG=$(echo "$FILENAME" | grep -oE 'cp3[0-9]+' | head -1)
            PY_MINOR="${PY_TAG#cp}"
            PY_VERSION="${PY_MINOR:0:1}.${PY_MINOR:1}"
            echo "Python version: $PY_VERSION"

            PYBIN="python$PY_VERSION"
            if ! command -v "$PYBIN" &>/dev/null; then
              echo "❌ $PYBIN not found on this runner"
              FAILED=$((FAILED + 1))
              continue
            fi
            echo "Using: $PYBIN ($($PYBIN --version))"

            curl -fsSL -o "$FILENAME" "$URL"
            echo "Downloaded $(du -sh "$FILENAME" | cut -f1): $FILENAME"

            $PYBIN -m pip install --upgrade pip --quiet
            $PYBIN -m pip install "./$FILENAME"
            $PYBIN -m pip install $TEST_DEPS --quiet

            if $PYBIN abstract_test.py; then
              echo "✅ PASSED: $FILENAME"
              TESTED=$((TESTED + 1))
            else
              echo "❌ FAILED: $FILENAME"
              FAILED=$((FAILED + 1))
            fi

            rm -f "$FILENAME"
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "macOS $ARCH wheels tested: $TESTED | Failed: $FAILED"

          if [[ $TESTED -eq 0 ]]; then
            echo "❌ No macOS $ARCH wheels were found or tested!"
            exit 1
          fi
          if [[ $FAILED -gt 0 ]]; then
            exit 1
          fi

  # ─────────────────────────────────────────────────
  # Gate
  # ─────────────────────────────────────────────────
  all-passed:
    name: All wheel tests passed
    needs: [test-linux, test-macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          LINUX="${{ needs.test-linux.result }}"
          MACOS="${{ needs.test-macos.result }}"
          echo "Linux/musl jobs: $LINUX"
          echo "macOS jobs:      $MACOS"
          if [[ "$LINUX" != "success" || "$MACOS" != "success" ]]; then
            echo "❌ One or more wheel tests have FAILED."
            exit 1
          fi
          echo "✅ All wheel tests have passed."
