name: Test Wheels

on:
  push:
    paths:
      - ".github/workflows/test_wheels.yml"
  release:
    types: [published]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Shared defaults
# ─────────────────────────────────────────────────────────────────────────────
defaults:
  run:
    shell: bash

env:
  # Bump here to pick up the fix everywhere (linux + macOS)
  TEST_DEPS: "scikit-learn aiohttp psutil pandas cryptography pytest"

jobs:
  # ───────────────────────────────────────────────
  # Step 1: Fetch latest release wheel URLs
  # ───────────────────────────────────────────────
  get-release:
    name: Fetch Latest Release Metadata
    runs-on: ubuntu-latest
    outputs:
      wheel_urls: ${{ steps.fetch.outputs.wheel_urls }}
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - name: Fetch latest release wheel URLs
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RELEASE_JSON=$(gh api "repos/${{ github.repository }}/releases/latest")
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          URLS=$(
            echo "$RELEASE_JSON" \
            | jq -c '[.assets[] | select(.name | endswith(".whl")) | .browser_download_url] | .[0:10]'
          )
          echo "wheel_urls=$URLS" >> "$GITHUB_OUTPUT"

          echo "Found wheels for $TAG:"
          echo "$URLS" | jq -r '.[]'

  # ───────────────────────────────────────────────
  # Step 2a: Linux — native runners per arch
  # ───────────────────────────────────────────────
  test-linux:
    name: "Test Linux (${{ matrix.runner_arch }})"
    needs: get-release
    if: needs.get-release.outputs.wheel_urls != '[]'
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest       # GitHub-hosted x86_64
            runner_arch: x86_64
            wheel_arch: x86_64
            docker_platform: linux/amd64
          - runner: ubuntu-24.04-arm   # GitHub-hosted native ARM64
            runner_arch: aarch64
            wheel_arch: aarch64
            docker_platform: linux/arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Linux ${{ matrix.runner_arch }} wheels
        env:
          WHEEL_URLS: ${{ needs.get-release.outputs.wheel_urls }}
          WHEEL_ARCH: ${{ matrix.wheel_arch }}
          DOCKER_PLATFORM: ${{ matrix.docker_platform }}
        run: |
          set -euo pipefail
          FAILED=0
          TESTED=0

          for URL in $(echo "$WHEEL_URLS" | jq -r '.[]'); do
            FILENAME="${URL##*/}"

            # ── arch filter ───────────────────────────────────────────────
            if [[ "$FILENAME" != *"linux"* ]]; then
              echo "⏭  Skipping non-Linux wheel: $FILENAME"
              continue
            fi

            IS_ARM=false; IS_X86=false
            [[ "$FILENAME" == *"aarch64"* || "$FILENAME" == *"arm64"* ]] && IS_ARM=true
            [[ "$FILENAME" == *"x86_64"*  || "$FILENAME" == *"amd64"*  ]] && IS_X86=true

            if [[ "$WHEEL_ARCH" == "aarch64" && "$IS_ARM" != "true" ]]; then
              echo "⏭  Skipping non-aarch64 wheel: $FILENAME"; continue
            fi
            if [[ "$WHEEL_ARCH" == "x86_64" && "$IS_X86" != "true" ]]; then
              echo "⏭  Skipping non-x86_64 wheel: $FILENAME"; continue
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Testing: $FILENAME"

            # ── Python version ────────────────────────────────────────────
            PY_TAG=$(echo "$FILENAME" | grep -oE 'cp3[0-9]+' | head -1)
            PY_MINOR="${PY_TAG#cp}"                      # e.g. 310
            PY_VERSION="${PY_MINOR:0:1}.${PY_MINOR:1}"  # e.g. 3.10
            echo "Python: $PY_VERSION"

            # ── Docker image & install extras ─────────────────────────────
            IMG_ARCH="$( [[ "$IS_ARM" == "true" ]] && echo "aarch64" || echo "x86_64" )"

            if [[ "$FILENAME" == *"musllinux"* ]]; then
              IMAGE="python:${PY_VERSION}-alpine"
              PYBIN="python"
              # g++ is required by scikit-learn's Meson build (and anything
              # that compiles C++ extensions); gcc covers pure-C packages.
              INSTALL_EXTRA="apk add --no-cache curl gcc g++ musl-dev libffi-dev make linux-headers && "
            else
              GLIBC=$(echo "$FILENAME" | grep -oE 'manylinux_[0-9]+_[0-9]+' | head -1 || echo "manylinux_2_28")
              IMAGE="quay.io/pypa/${GLIBC}_${IMG_ARCH}"
              PYBIN="/opt/python/cp${PY_MINOR}-cp${PY_MINOR}/bin/python3"
              INSTALL_EXTRA=""
            fi

            echo "Image:    $IMAGE"
            echo "Platform: $DOCKER_PLATFORM"

            # ── Download ──────────────────────────────────────────────────
            if ! curl -fsSL --retry 3 --retry-delay 5 -o "$FILENAME" "$URL"; then
              echo "❌ Download failed: $URL"
              FAILED=$((FAILED + 1))
              continue
            fi
            echo "Downloaded $(du -sh "$FILENAME" | cut -f1)"

            # ── Run in container ──────────────────────────────────────────
            INSTALL_CMD="${INSTALL_EXTRA}${PYBIN} -m pip install --upgrade pip --quiet \
              && ${PYBIN} -m pip install ./${FILENAME} \
              && ${PYBIN} -m pip install ${TEST_DEPS} --quiet \
              && ${PYBIN} abstract_test.py"

            if docker run --rm \
                --platform "$DOCKER_PLATFORM" \
                -v "$PWD:/workspace" -w /workspace \
                "$IMAGE" \
                sh -c "$INSTALL_CMD"; then
              echo "✅ PASSED: $FILENAME"
              TESTED=$((TESTED + 1))
            else
              echo "❌ FAILED: $FILENAME"
              FAILED=$((FAILED + 1))
            fi

            rm -f "$FILENAME"
          done

          # ── Summary ───────────────────────────────────────────────────────
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Linux $WHEEL_ARCH — tested: $TESTED | failed: $FAILED"
          [[ $TESTED -gt 0 ]]  || { echo "❌ No wheels were found or tested!"; exit 1; }
          [[ $FAILED -eq 0 ]]  || exit 1

  # ───────────────────────────────────────────────
  # Step 2b: macOS — native runners per arch
  #
  # macos-13 (x86_64) has limited GitHub capacity
  # and may queue for hours; continue-on-error:true
  # prevents it from blocking the gate. Remove that
  # flag if x86_64 coverage must be mandatory.
  # ───────────────────────────────────────────────
  test-macos:
    name: "Test macOS (${{ matrix.arch }})"
    needs: get-release
    if: needs.get-release.outputs.wheel_urls != '[]'
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13        # x86_64 — limited capacity, may queue
            arch: x86_64
            continue_on_error: true
          - os: macos-latest    # arm64 — plentiful capacity
            arch: arm64
            continue_on_error: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue_on_error }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required Python versions via Homebrew
        run: |
          set -euo pipefail
          for V in 3.10 3.11 3.12; do
            if command -v "python$V" &>/dev/null; then
              echo "python$V already available: $(python$V --version)"
            else
              echo "Installing python@$V ..."
              brew install "python@$V" || true
            fi
          done

      - name: Test macOS ${{ matrix.arch }} wheels
        env:
          WHEEL_URLS: ${{ needs.get-release.outputs.wheel_urls }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          FAILED=0
          TESTED=0

          for URL in $(echo "$WHEEL_URLS" | jq -r '.[]'); do
            FILENAME="${URL##*/}"

            if [[ "$FILENAME" != *"macosx"* ]]; then
              echo "⏭  Skipping non-macOS wheel: $FILENAME"; continue
            fi
            if [[ "$FILENAME" != *"$ARCH"* ]]; then
              echo "⏭  Skipping wrong-arch wheel ($ARCH): $FILENAME"; continue
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Testing: $FILENAME"

            PY_TAG=$(echo "$FILENAME" | grep -oE 'cp3[0-9]+' | head -1)
            PY_MINOR="${PY_TAG#cp}"
            PY_VERSION="${PY_MINOR:0:1}.${PY_MINOR:1}"
            PYBIN="python$PY_VERSION"
            echo "Python: $PY_VERSION"

            if ! command -v "$PYBIN" &>/dev/null; then
              echo "❌ $PYBIN not found on this runner"
              FAILED=$((FAILED + 1))
              continue
            fi
            echo "Using: $PYBIN ($($PYBIN --version))"

            if ! curl -fsSL --retry 3 --retry-delay 5 -o "$FILENAME" "$URL"; then
              echo "❌ Download failed: $URL"
              FAILED=$((FAILED + 1))
              continue
            fi
            echo "Downloaded $(du -sh "$FILENAME" | cut -f1)"

            $PYBIN -m pip install --upgrade pip --quiet
            $PYBIN -m pip install "./$FILENAME"
            $PYBIN -m pip install $TEST_DEPS --quiet

            if $PYBIN abstract_test.py; then
              echo "✅ PASSED: $FILENAME"
              TESTED=$((TESTED + 1))
            else
              echo "❌ FAILED: $FILENAME"
              FAILED=$((FAILED + 1))
            fi

            rm -f "$FILENAME"
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "macOS $ARCH — tested: $TESTED | failed: $FAILED"
          [[ $TESTED -gt 0 ]]  || { echo "❌ No wheels were found or tested!"; exit 1; }
          [[ $FAILED -eq 0 ]]  || exit 1

  # ───────────────────────────────────────────────
  # Gate — requires both Linux and macOS to pass
  # ───────────────────────────────────────────────
  all-passed:
    name: All wheel tests passed
    needs: [test-linux, test-macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          LINUX="${{ needs.test-linux.result }}"
          MACOS="${{ needs.test-macos.result }}"
          echo "Linux jobs : $LINUX"
          echo "macOS jobs : $MACOS"
          # macos-13 (x86_64) uses continue-on-error so its failures surface
          # as 'success' at the job level — only true infra failures propagate.
          if [[ "$LINUX" != "success" || "$MACOS" != "success" ]]; then
            echo "❌ One or more wheel tests FAILED."
            exit 1
          fi
          echo "✅ All wheel tests passed."
