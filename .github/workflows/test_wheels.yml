name: Test Wheels

on:
  push:
    paths:
      - ".github/workflows/test_wheels.yml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────
  # Step 1: Fetch latest release wheel URLs
  # ─────────────────────────────────────────────────
  get-release:
    name: Fetch Latest Release Metadata
    runs-on: ubuntu-latest
    outputs:
      wheel_urls: ${{ steps.fetch.outputs.wheel_urls }}
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - name: Fetch latest release wheel URLs
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases/latest)
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          URLS=$(echo "$RELEASE_JSON" \
            | jq -c '[.assets[] | select(.name | endswith(".whl")) | .browser_download_url] | .[0:10]')
          echo "wheel_urls=$URLS" >> "$GITHUB_OUTPUT"
          echo "Found wheels for $TAG:"
          echo "$URLS" | jq -r '.[]'

  # ─────────────────────────────────────────────────
  # Step 2a: Linux wheels — native runners per arch
  # Split into x86_64 and aarch64 so arm64 runs on a
  # real ARM runner instead of QEMU emulation.
  # ─────────────────────────────────────────────────
  test-linux:
    name: "Test Linux wheels (${{ matrix.runner_arch }})"
    needs: get-release
    if: ${{ needs.get-release.outputs.wheel_urls != '[]' }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest       # GitHub-hosted x86_64
            runner_arch: x86_64
            wheel_arch: x86_64
            docker_platform: linux/amd64
          - runner: ubuntu-24.04-arm   # GitHub-hosted native ARM64
            runner_arch: aarch64
            wheel_arch: aarch64
            docker_platform: linux/arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # No QEMU needed — each job runs on its native arch runner
      - name: Test Linux ${{ matrix.runner_arch }} wheels
        shell: bash
        env:
          WHEEL_URLS: ${{ needs.get-release.outputs.wheel_urls }}
          WHEEL_ARCH: ${{ matrix.wheel_arch }}
          DOCKER_PLATFORM: ${{ matrix.docker_platform }}
        run: |
          set -euo pipefail
          FAILED=0
          TESTED=0

          # Dependencies to install before running the test script
          TEST_DEPS="scikit-learn aiohttp psutil pandas"

          for URL in $(echo "$WHEEL_URLS" | jq -r '.[]'); do
            FILENAME="${URL##*/}"

            # Only Linux wheels
            if [[ "$FILENAME" != *"linux"* ]]; then
              echo "⏭ Skipping non-Linux wheel: $FILENAME"
              continue
            fi

            # Only wheels matching this runner's arch.
            # manylinux/musllinux wheels always use "aarch64" or "x86_64" —
            # never "arm64" — but guard both just in case a build tool differs.
            IS_ARM=false
            IS_X86=false
            [[ "$FILENAME" == *"aarch64"* || "$FILENAME" == *"arm64"* ]] && IS_ARM=true
            [[ "$FILENAME" == *"x86_64"* || "$FILENAME" == *"amd64"* ]]  && IS_X86=true

            if [[ "$WHEEL_ARCH" == "aarch64" && "$IS_ARM" != "true" ]]; then
              echo "⏭ Skipping non-aarch64 wheel: $FILENAME"
              continue
            fi
            if [[ "$WHEEL_ARCH" == "x86_64" && "$IS_X86" != "true" ]]; then
              echo "⏭ Skipping non-x86_64 wheel: $FILENAME"
              continue
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Testing: $FILENAME"

            # Decode Python version: cp310→3.10, cp311→3.11, cp312→3.12
            PY_TAG=$(echo "$FILENAME" | grep -oE 'cp3[0-9]+' | head -1)
            PY_MINOR="${PY_TAG#cp}"                        # 310, 311, 312
            PY_VERSION="${PY_MINOR:0:1}.${PY_MINOR:1}"    # 3.10, 3.11, 3.12
            echo "Python version: $PY_VERSION"

            # Pull the arch token directly from the filename so the Docker image
            # tag matches exactly what the wheel was built for (aarch64/x86_64).
            # manylinux image tags always use aarch64/x86_64, never arm64/amd64.
            if [[ "$IS_ARM" == "true" ]]; then
              IMG_ARCH="aarch64"
            else
              IMG_ARCH="x86_64"
            fi

            # Choose Docker image based on musl vs manylinux
            if [[ "$FILENAME" == *"musllinux"* ]]; then
              IMAGE="python:${PY_VERSION}-alpine"
              PYBIN="python"
              INSTALL_EXTRA="apk add --no-cache curl gcc musl-dev libffi-dev && "
            else
              # manylinux — parse glibc version from wheel tag e.g. manylinux_2_28
              GLIBC=$(echo "$FILENAME" | grep -oE 'manylinux_[0-9]+_[0-9]+' | head -1)
              if [[ -z "$GLIBC" ]]; then
                GLIBC="manylinux_2_28"  # fallback
              fi
              IMAGE="quay.io/pypa/${GLIBC}_${IMG_ARCH}"
              PYBIN="/opt/python/cp${PY_MINOR}-cp${PY_MINOR}/bin/python3"
              INSTALL_EXTRA=""
            fi

            echo "Image:    $IMAGE"
            echo "Platform: $DOCKER_PLATFORM"
            echo "PyBin:    $PYBIN"

            # Download wheel into workspace
            curl -fsSL -o "$FILENAME" "$URL"
            echo "Downloaded $(du -sh "$FILENAME" | cut -f1): $FILENAME"

            # Run install + test inside container.
            # --platform is still passed for correctness, but the image pulled
            # will be the native arch since we're on a matching runner.
            if docker run --rm --platform "$DOCKER_PLATFORM" \
              -v "$PWD:/workspace" -w /workspace \
              "$IMAGE" \
              sh -c "${INSTALL_EXTRA}${PYBIN} -m pip install --upgrade pip --quiet && ${PYBIN} -m pip install ./${FILENAME} && ${PYBIN} -m pip install ${TEST_DEPS} --quiet && ${PYBIN} abstract_test.py"; then
              echo "✅ PASSED: $FILENAME"
              TESTED=$((TESTED + 1))
            else
              echo "❌ FAILED: $FILENAME"
              FAILED=$((FAILED + 1))
            fi

            # Clean up wheel between runs
            rm -f "$FILENAME"
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Linux $WHEEL_ARCH wheels tested: $TESTED | Failed: $FAILED"

          if [[ $TESTED -eq 0 ]]; then
            echo "❌ No Linux $WHEEL_ARCH wheels were found or tested!"
            exit 1
          fi
          if [[ $FAILED -gt 0 ]]; then
            exit 1
          fi

  # ─────────────────────────────────────────────────
  # Step 2b: macOS wheels — native runners required
  #
  # macos-13 (x86_64) has very limited GitHub-hosted
  # capacity and can queue for hours. Two fixes:
  #   1. timeout-minutes: 30 so a stuck job fails fast
  #      instead of blocking the gate indefinitely.
  #   2. The gate job treats a macos x86_64 *timeout*
  #      as a warning, not a hard failure, via
  #      continue-on-error: true on the x86_64 matrix
  #      leg. Remove that if x86_64 is required.
  # ─────────────────────────────────────────────────
  test-macos:
    name: "Test macOS ${{ matrix.arch }} wheels"
    needs: get-release
    if: ${{ needs.get-release.outputs.wheel_urls != '[]' }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13        # x86_64 — limited capacity, may queue
            arch: x86_64
            continue-on-error: true   # don't block gate if runner is unavailable
          - os: macos-latest    # arm64 — plentiful capacity
            arch: arm64
            continue-on-error: false

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.continue-on-error }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install required Python versions via Homebrew
        shell: bash
        run: |
          # Ensure python 3.10, 3.11, 3.12 are available
          for V in 3.10 3.11 3.12; do
            if ! command -v "python$V" &>/dev/null; then
              echo "Installing python@$V..."
              brew install "python@$V" || true
            else
              echo "python$V already available: $(python$V --version)"
            fi
          done

      - name: Test macOS ${{ matrix.arch }} wheels
        shell: bash
        env:
          WHEEL_URLS: ${{ needs.get-release.outputs.wheel_urls }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          FAILED=0
          TESTED=0

          # Dependencies to install before running the test script
          TEST_DEPS="scikit-learn aiohttp psutil pandas"

          for URL in $(echo "$WHEEL_URLS" | jq -r '.[]'); do
            FILENAME="${URL##*/}"

            # Only macOS wheels for this arch
            if [[ "$FILENAME" != *"macosx"* ]]; then
              echo "⏭ Skipping non-macOS wheel: $FILENAME"
              continue
            fi
            if [[ "$FILENAME" != *"$ARCH"* ]]; then
              echo "⏭ Skipping wrong-arch wheel ($ARCH): $FILENAME"
              continue
            fi

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Testing: $FILENAME"

            # Decode Python version from cp tag
            PY_TAG=$(echo "$FILENAME" | grep -oE 'cp3[0-9]+' | head -1)
            PY_MINOR="${PY_TAG#cp}"
            PY_VERSION="${PY_MINOR:0:1}.${PY_MINOR:1}"
            echo "Python version: $PY_VERSION"

            PYBIN="python$PY_VERSION"
            if ! command -v "$PYBIN" &>/dev/null; then
              echo "❌ $PYBIN not found on this runner"
              FAILED=$((FAILED + 1))
              continue
            fi
            echo "Using: $PYBIN ($($PYBIN --version))"

            curl -fsSL -o "$FILENAME" "$URL"
            echo "Downloaded $(du -sh "$FILENAME" | cut -f1): $FILENAME"

            $PYBIN -m pip install --upgrade pip --quiet
            $PYBIN -m pip install "./$FILENAME"
            $PYBIN -m pip install $TEST_DEPS --quiet

            if $PYBIN abstract_test.py; then
              echo "✅ PASSED: $FILENAME"
              TESTED=$((TESTED + 1))
            else
              echo "❌ FAILED: $FILENAME"
              FAILED=$((FAILED + 1))
            fi

            rm -f "$FILENAME"
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "macOS $ARCH wheels tested: $TESTED | Failed: $FAILED"

          if [[ $TESTED -eq 0 ]]; then
            echo "❌ No macOS $ARCH wheels were found or tested!"
            exit 1
          fi
          if [[ $FAILED -gt 0 ]]; then
            exit 1
          fi

  # ─────────────────────────────────────────────────
  # Gate
  # ─────────────────────────────────────────────────
  all-passed:
    name: All wheel tests passed
    needs: [test-linux, test-macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          LINUX="${{ needs.test-linux.result }}"
          MACOS="${{ needs.test-macos.result }}"
          echo "Linux jobs: $LINUX"
          echo "macOS jobs: $MACOS"
          # macos-13 (x86_64) uses continue-on-error so its failures surface
          # as 'success' at the job level; only a true infra failure shows here.
          if [[ "$LINUX" != "success" || "$MACOS" != "success" ]]; then
            echo "❌ One or more wheel tests have FAILED."
            exit 1
          fi
          echo "✅ All wheel tests have passed."
