name: Test Wheels

on:
  push:
    paths:
      - ".github/workflows/test_wheels.yml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────
  # Step 1: Fetch the latest release assets once,
  # then fan-out to the matrix jobs below.
  # ─────────────────────────────────────────────────
  get-release:
    name: Fetch Latest Release Metadata
    runs-on: ubuntu-latest
    outputs:
      wheel_urls: ${{ steps.fetch.outputs.wheel_urls }}
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - name: Fetch latest release wheel URLs
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases/latest)
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          URLS=$(echo "$RELEASE_JSON" \
            | jq -c '[.assets[] | select(.name | endswith(".whl")) | .browser_download_url] | .[0:10]')
          echo "wheel_urls=$URLS" >> "$GITHUB_OUTPUT"
          echo "Found wheels for $TAG:"
          echo "$URLS" | jq -r '.[]'

  # ─────────────────────────────────────────────────
  # Step 2: Matrix test
  # ─────────────────────────────────────────────────
  test-wheels:
    name: "[${{ matrix.python-version }}] ${{ matrix.os }}"
    needs: get-release
    if: ${{ needs.get-release.outputs.wheel_urls != '[]' }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-13
          - macos-latest
        wheel_url: ${{ fromJson(needs.get-release.outputs.wheel_urls) }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Classify wheel vs runner compatibility ──────────────────────────
      - name: Classify wheel and runner
        id: classify
        shell: bash
        run: |
          WHEEL_URL="${{ matrix.wheel_url }}"
          OS="${{ matrix.os }}"

          # Extract the original filename from the URL
          WHEEL_FILENAME="${WHEEL_URL##*/}"
          echo "wheel_filename=$WHEEL_FILENAME" >> "$GITHUB_OUTPUT"
          echo "Wheel filename: $WHEEL_FILENAME"

          IS_MUSL=false
          IS_LINUX=false
          IS_MACOS=false
          IS_AARCH64=false
          IS_X86_64=false

          [[ "$WHEEL_FILENAME" == *"musllinux"*   ]] && IS_MUSL=true
          [[ "$WHEEL_FILENAME" == *"manylinux"*   ]] && IS_LINUX=true
          [[ "$WHEEL_FILENAME" == *"linux"*        ]] && IS_LINUX=true
          [[ "$WHEEL_FILENAME" == *"macosx"*       ]] && IS_MACOS=true
          [[ "$WHEEL_FILENAME" == *"aarch64"*      ]] && IS_AARCH64=true
          [[ "$WHEEL_FILENAME" == *"x86_64"*       ]] && IS_X86_64=true

          RUNNER_ARM=false
          RUNNER_X86=false
          RUNNER_MAC=false
          [[ "$OS" == "ubuntu-24.04-arm" || "$OS" == "macos-latest" ]] && RUNNER_ARM=true
          [[ "$OS" == "ubuntu-latest"    || "$OS" == "macos-13"     ]] && RUNNER_X86=true
          [[ "$OS" == macos-*                                        ]] && RUNNER_MAC=true

          SKIP=false
          $IS_MACOS   && ! $RUNNER_MAC && SKIP=true
          ! $IS_MACOS && $RUNNER_MAC   && SKIP=true
          $IS_AARCH64 && $RUNNER_X86   && SKIP=true
          $IS_X86_64  && $RUNNER_ARM   && SKIP=true

          echo "skip=$SKIP"       >> "$GITHUB_OUTPUT"
          echo "is_musl=$IS_MUSL" >> "$GITHUB_OUTPUT"

          if $SKIP; then
            echo "⏭ Skipping incompatible combination: $WHEEL_FILENAME on $OS"
          else
            echo "✅ Compatible: $WHEEL_FILENAME on $OS"
          fi

      # ── Standard (non-musl) path ────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        if: steps.classify.outputs.skip == 'false' && steps.classify.outputs.is_musl == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel (standard)
        if: steps.classify.outputs.skip == 'false' && steps.classify.outputs.is_musl == 'false'
        shell: bash
        run: |
          # Use the real filename so pip sees a valid wheel filename
          WHEEL_FILENAME="${{ steps.classify.outputs.wheel_filename }}"
          curl -fsSL -o "$WHEEL_FILENAME" "${{ matrix.wheel_url }}"
          echo "Downloaded: $WHEEL_FILENAME"
          ls -lh "$WHEEL_FILENAME"

      - name: Install & test wheel (standard)
        if: steps.classify.outputs.skip == 'false' && steps.classify.outputs.is_musl == 'false'
        shell: bash
        run: |
          WHEEL_FILENAME="${{ steps.classify.outputs.wheel_filename }}"
          python -m pip install --upgrade pip
          # Use ./ prefix so pip treats it as a local path, not a package name
          pip install "./$WHEEL_FILENAME"
          python abstract_test.py

      # ── musllinux path — Alpine container ──────────────────────────────
      - name: Install & test wheel (musllinux / Alpine)
        if: steps.classify.outputs.skip == 'false' && steps.classify.outputs.is_musl == 'true'
        uses: addnab/docker-run-action@v3
        with:
          image: >-
            ${{
              matrix.python-version == '3.10' && 'python:3.10-alpine' ||
              matrix.python-version == '3.11' && 'python:3.11-alpine' ||
              'python:3.12-alpine'
            }}
          options: -v ${{ github.workspace }}:/workspace
          run: |
            set -e
            apk add --no-cache curl
            cd /workspace
            WHEEL_FILENAME="${{ steps.classify.outputs.wheel_filename }}"
            curl -fsSL -o "$WHEEL_FILENAME" "${{ matrix.wheel_url }}"
            echo "Downloaded: $WHEEL_FILENAME"
            pip install --upgrade pip
            # Use ./ prefix so pip treats it as a local path, not a package name
            pip install "./$WHEEL_FILENAME"
            python abstract_test.py

  # ─────────────────────────────────────────────────
  # Step 3: Gate
  # ─────────────────────────────────────────────────
  all-passed:
    name: All wheel tests passed
    needs: test-wheels
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [[ "${{ needs.test-wheels.result }}" != "success" ]]; then
            echo "❌ One or more wheel tests FAILED."
            exit 1
          fi
          echo "✅ All wheel tests passed."
