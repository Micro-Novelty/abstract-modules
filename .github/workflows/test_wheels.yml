name: Test Wheels

on:
  push:
    paths:
      - ".github/workflows/test_wheels.yml"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────
  # Step 1: Fetch the latest release assets once,
  # then fan-out to the matrix jobs below.
  # ─────────────────────────────────────────────────
  get-release:
    name: Fetch Latest Release Metadata
    runs-on: ubuntu-latest
    outputs:
      wheel_urls: ${{ steps.fetch.outputs.wheel_urls }}
      tag: ${{ steps.fetch.outputs.tag }}
    steps:
      - name: Fetch latest release wheel URLs
        id: fetch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases/latest)
          TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Collect all .whl asset download URLs (up to 10)
          URLS=$(echo "$RELEASE_JSON" \
            | jq -c '[.assets[] | select(.name | endswith(".whl")) | .browser_download_url] | .[0:10]')
          echo "wheel_urls=$URLS" >> "$GITHUB_OUTPUT"
          echo "Found wheels for $TAG:"
          echo "$URLS" | jq -r '.[]'

  # ─────────────────────────────────────────────────
  # Step 2: Matrix test across every combination of
  # runner OS × Python version × wheel.
  # Platform compatibility is checked at runtime via
  # an `if:` guard on each step (matrix context is
  # NOT available inside `exclude:` blocks).
  # ─────────────────────────────────────────────────
  test-wheels:
    name: "[${{ matrix.python-version }}] ${{ matrix.os }}"
    needs: get-release
    if: ${{ needs.get-release.outputs.wheel_urls != '[]' }}

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os:
          - ubuntu-latest        # manylinux  x86_64
          - ubuntu-24.04-arm     # manylinux  aarch64
          - macos-13             # macOS      x86_64
          - macos-latest         # macOS      arm64
        wheel_url: ${{ fromJson(needs.get-release.outputs.wheel_urls) }}
        # NOTE: No `exclude:` here — filtering is done at runtime below
        #       because `matrix` context is unavailable in exclude blocks.

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Detect what kind of wheel this is ──────────────────────────────
      - name: Classify wheel and runner
        id: classify
        shell: bash
        run: |
          WHEEL="${{ matrix.wheel_url }}"
          OS="${{ matrix.os }}"

          # Wheel platform flags
          IS_MUSL=false
          IS_LINUX=false
          IS_MACOS=false
          IS_AARCH64=false
          IS_X86_64=false

          [[ "$WHEEL" == *"musllinux"*                        ]] && IS_MUSL=true
          [[ "$WHEEL" == *"manylinux"* || "$WHEEL" == *"linux"* ]] && IS_LINUX=true
          [[ "$WHEEL" == *"macosx"*                           ]] && IS_MACOS=true
          [[ "$WHEEL" == *"aarch64"*                          ]] && IS_AARCH64=true
          [[ "$WHEEL" == *"x86_64"*                           ]] && IS_X86_64=true

          # Runner arch flags
          RUNNER_ARM=false
          RUNNER_X86=false
          RUNNER_MAC=false
          [[ "$OS" == "ubuntu-24.04-arm" || "$OS" == "macos-latest" ]] && RUNNER_ARM=true
          [[ "$OS" == "ubuntu-latest"    || "$OS" == "macos-13"     ]] && RUNNER_X86=true
          [[ "$OS" == macos-*                                        ]] && RUNNER_MAC=true

          # Compatibility check: skip if wheel arch != runner arch,
          # or if wheel OS != runner OS family.
          SKIP=false
          $IS_MACOS  && ! $RUNNER_MAC  && SKIP=true   # macOS wheel on Linux runner
          ! $IS_MACOS && $RUNNER_MAC   && SKIP=true   # Linux wheel on macOS runner
          $IS_AARCH64 && $RUNNER_X86   && SKIP=true   # aarch64 wheel on x86_64 runner
          $IS_X86_64  && $RUNNER_ARM   && SKIP=true   # x86_64  wheel on aarch64 runner

          echo "skip=$SKIP"         >> "$GITHUB_OUTPUT"
          echo "is_musl=$IS_MUSL"   >> "$GITHUB_OUTPUT"

          if $SKIP; then
            echo "⏭ Skipping incompatible wheel/runner combination."
          else
            echo "✅ Wheel is compatible with this runner."
          fi

      # ── Standard (non-musl) path ────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        if: steps.classify.outputs.skip == 'false' && steps.classify.outputs.is_musl == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheel (standard)
        if: steps.classify.outputs.skip == 'false' && steps.classify.outputs.is_musl == 'false'
        shell: bash
        run: curl -fsSL -o wheel.whl "${{ matrix.wheel_url }}"

      - name: Install & test wheel (standard)
        if: steps.classify.outputs.skip == 'false' && steps.classify.outputs.is_musl == 'false'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install wheel.whl
          python abstract_test.py

      # ── musllinux path — run inside Alpine container ────────────────────
      - name: Install & test wheel (musllinux / Alpine)
        if: steps.classify.outputs.skip == 'false' && steps.classify.outputs.is_musl == 'true'
        uses: addnab/docker-run-action@v3
        with:
          image: >-
            ${{
              matrix.python-version == '3.10' && 'python:3.10-alpine' ||
              matrix.python-version == '3.11' && 'python:3.11-alpine' ||
              'python:3.12-alpine'
            }}
          options: -v ${{ github.workspace }}:/workspace
          run: |
            set -e
            apk add --no-cache curl
            cd /workspace
            curl -fsSL -o wheel.whl "${{ matrix.wheel_url }}"
            pip install --upgrade pip
            pip install wheel.whl
            python abstract_test.py

  # ─────────────────────────────────────────────────
  # Step 3: Gate — fails the whole CI if any matrix
  # leg returned a non-success result.
  # ─────────────────────────────────────────────────
  all-passed:
    name: All wheel tests passed
    needs: test-wheels
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check matrix result
        run: |
          if [[ "${{ needs.test-wheels.result }}" != "success" ]]; then
            echo "❌ One or more wheel tests FAILED."
            exit 1
          fi
          echo "✅ All wheel tests passed."
