name: Update pip index # pip index html update
on:
  release: #r
    types: [published] # publish type
  workflow_dispatch:
  push:
    branches:
      - gh-pages  # ← triggers when you push to gh-pages here

permissions:
  contents: write # write contents in here too

jobs:
  update-index: #update index 
    runs-on: ubuntu-latest # lates ubuntu
    steps:
      - name: Checkout #checkout
        uses: actions/checkout@v4

      - name: Regenerate index # regenerate to index.html
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} #token
        run: | # run it
          python3 generate_index.py 

      - name: Commit and push #push here too
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add whl/ .nojekyll
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Update pip index for ${{ github.ref_name }}"
          git push origin HEAD:gh-pages
